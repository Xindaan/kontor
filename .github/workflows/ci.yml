name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # Core deps come from pyproject via the poetry-core build backend.
        # The web/ML/sentiment groups are optional; we install the web extras
        # so the web tests run, while the ML/DL/sentiment tests skip gracefully
        # (they guard their heavy imports — torch, lightgbm, nltk).
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest fastapi uvicorn python-multipart httpx

      - name: Run tests
        # `backtest` resolves via the editable install; `strategies` resolves
        # from the repo root (python -m pytest puts the CWD on sys.path).
        run: python -m pytest tests/ -q
